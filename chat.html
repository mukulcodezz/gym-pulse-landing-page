<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Try it - GymPulse | Chat with the demo bot</title>
  <meta name="description" content="Talk to the GymPulse demo assistant in full screen. Ask about features, pricing or setup - English or Hinglish, it gets both." />

  <meta property="og:title" content="Try GymPulse - chat with the demo bot" />
  <meta property="og:description" content="Ask the demo assistant anything about GymPulse. Hinglish works too." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="chatpage">
  <div class="grain" aria-hidden="true"></div>
  <div class="orb orb--1" aria-hidden="true"></div>
  <div class="orb orb--2" aria-hidden="true"></div>

        <span class="brand__mark" aria-hidden="true"></span>
        <span class="brand__name">GymPulse</span>
      </a>

      <nav class="nav__links" aria-label="Primary">
        <a href="index.html#features">Features</a>
        <a href="demo.html">Demo</a>
        <a href="chat.html" aria-current="page">Try it</a>
        <a href="index.html#how">How it works</a>
        <a href="index.html#pricing">Pricing</a>
      </nav>

      <div class="nav__cta">
        <a class="btn btn--ghost" href="index.html#quote">Get a quote</a>
        <a class="btn btn--solid magnetic" href="index.html#trial">
          <span>Start free trial</span>
          <span class="btn__ic" aria-hidden="true"></span>
        </a>
      </div>

      <button class="nav__burger" aria-label="Open menu" aria-expanded="false" data-burger>
        <span></span><span></span>
      </button>
    </div>
  </header>

  <div class="menu" id="menu" aria-hidden="true">
    <nav class="menu__links" aria-label="Mobile">
      <a href="index.html#features">Features</a>
      <a href="demo.html">Demo</a>
      <a href="chat.html" aria-current="page">Try it</a>
      <a href="index.html#how">How it works</a>
      <a href="index.html#pricing">Pricing</a>
      <a class="btn btn--solid btn--lg" href="index.html#trial">Start free trial</a>
      <a class="btn btn--ghost btn--lg" href="index.html#quote">Get a quote</a>
    </nav>
  </div>

  <!-- ===================== FULLSCREEN CHAT ===================== -->
  <main class="fchat">
    <div class="fchat__shell">
      <div class="fchat__head">
        <div class="fchat__av" aria-hidden="true">GP</div>
        <div class="fchat__meta">
          <strong>GymPulse Demo</strong>
          <span class="fchat__status"><i></i>online &middot; ask anything <em>(Hinglish works!)</em></span>
        </div>
        <span class="fchat__quota" id="fcQuota"></span>
      </div>

      <div class="fchat__body" id="fcBody" aria-live="polite" aria-relevant="additions"></div>

      <div class="fchat__suggest" id="fcSuggest">
        <button type="button" data-q="What does GymPulse actually do?">What does it do?</button>
        <button type="button" data-q="price kya hai?">price kya hai?</button>
        <button type="button" data-q="How long does setup take?">Setup time?</button>
        <button type="button" data-q="Do members need to install an app?">Need an app?</button>
      </div>

      <div class="fchat__foot" id="fcFoot">
        <input class="fchat__in" id="fcIn" type="text"
          placeholder="Ask about features, pricing, setup&hellip;"
          autocomplete="off" maxlength="300" />
        <button class="fchat__go" id="fcGo" type="button" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <script>
  /* Fullscreen demo chat — same session + quota as the floating widget */
  (function () {
    'use strict';

    var MAX_MSGS = 10;
    var SESSION_KEY = 'gp_demo_sid';
    var COUNT_KEY = 'gp_demo_cnt';

    function store(key, val) { try { localStorage.setItem(key, val); } catch (_) {} }
    function load(key) { try { return localStorage.getItem(key); } catch (_) { return null; } }

    function getSessionId() {
      var id = load(SESSION_KEY);
      if (!id || !/^gp-[a-z0-9]+-[a-z0-9]+$/.test(id)) {
        id = ('gp-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 11)).toLowerCase();
        store(SESSION_KEY, id);
      }
      return id;
    }

    function getCount() { return Math.min(parseInt(load(COUNT_KEY) || '0', 10), MAX_MSGS); }
    function incCount() { var n = getCount() + 1; store(COUNT_KEY, n); return n; }

    var SID = getSessionId();
    var busy = false;
    var history = [];

    var bodyEl    = document.getElementById('fcBody');
    var quotaEl   = document.getElementById('fcQuota');
    var footEl    = document.getElementById('fcFoot');
    var suggestEl = document.getElementById('fcSuggest');
    var inputEl   = document.getElementById('fcIn');
    var sendEl    = document.getElementById('fcGo');

    function updateQuota() {
      var left = Math.max(0, MAX_MSGS - getCount());
      quotaEl.textContent = left > 0 ? left + ' left' : '';
    }

    function bubble(text, side) {
      var d = document.createElement('div');
      d.className = 'fchat__msg fchat__msg--' + side;
      d.textContent = text;
      bodyEl.appendChild(d);
      bodyEl.scrollTop = bodyEl.scrollHeight;
      return d;
    }

    function typing() {
      var d = document.createElement('div');
      d.className = 'fchat__dots';
      d.setAttribute('aria-label', 'Thinking…');
      d.innerHTML = '<span></span><span></span><span></span>';
      bodyEl.appendChild(d);
      bodyEl.scrollTop = bodyEl.scrollHeight;
      return d;
    }

    function lockFoot(phone) {
      var cta = document.createElement('div');
      cta.className = 'fchat__cta';
      cta.textContent = 'Demo limit reached.';
      if (phone) {
        cta.appendChild(document.createTextNode(' For a full walkthrough: '));
        var a = document.createElement('a');
        a.href = 'https://wa.me/' + phone.replace(/[^0-9]/g, '');
        a.textContent = phone;
        cta.appendChild(a);
      }
      footEl.textContent = '';
      footEl.appendChild(cta);
      suggestEl.remove();
      quotaEl.textContent = '';
    }

    function hideSuggest() {
      if (suggestEl && suggestEl.parentNode) suggestEl.classList.add('is-gone');
    }

    function greet() {
      if (getCount() >= MAX_MSGS) {
        bubble('You\'ve already used the demo limit. Contact the owner for a live walkthrough!', 'bot');
        lockFoot(null);
        return;
      }
      bubble(
        'Hi! I\'m the GymPulse demo assistant. ' +
        'Ask about features, pricing, or how it works. ' +
        'Hinglish works too — try "price kya hai?" 💪',
        'bot'
      );
      updateQuota();
    }

    async function send(textOverride) {
      var text = (textOverride || inputEl.value).trim();
      if (!text || busy) return;
      if (getCount() >= MAX_MSGS) { lockFoot(null); return; }

      inputEl.value = '';
      sendEl.disabled = true;
      busy = true;
      hideSuggest();

      history.push({ role: 'user', content: text });
      bubble(text, 'user');
      var dots = typing();

      try {
        var resp = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Session-ID': SID,
          },
          body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
        });

        var data = await resp.json();
        dots.remove();

        if (data.reply) {
          incCount();
          history.push({ role: 'assistant', content: data.reply });
          bubble(data.reply, 'bot');
          updateQuota();
          if (data.limitReached || getCount() >= MAX_MSGS) {
            lockFoot(data.ownerPhone || null);
          }
        } else {
          bubble('Something went wrong — please try again.', 'bot');
        }
      } catch (_) {
        dots.remove();
        bubble('Could not reach the demo server. Please try again in a moment.', 'bot');
      }

      sendEl.disabled = false;
      busy = false;
      if (document.activeElement !== inputEl) inputEl.focus();
    }

    sendEl.addEventListener('click', function () { send(); });
    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    suggestEl.addEventListener('click', function (e) {
      var b = e.target.closest('button[data-q]');
      if (b) send(b.getAttribute('data-q'));
    });

    /* burger menu (same behaviour as other pages) */
    var burger = document.querySelector('[data-burger]');
    var menu = document.getElementById('menu');
    if (burger && menu) {
      burger.addEventListener('click', function () {
        var open = menu.classList.toggle('is-open');
        burger.setAttribute('aria-expanded', String(open));
        menu.setAttribute('aria-hidden', String(!open));
        document.body.classList.toggle('no-scroll', open);
      });
    }

    greet();
    inputEl.focus();
  })();
  </script>
</body>
</html>
